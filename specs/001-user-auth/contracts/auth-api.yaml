openapi: 3.0.3
info:
  title: Wallet Auth API
  version: "1.0.0"
  description: Contrato de la feature 001 (Autenticación de usuario).
servers:
  - url: http://localhost:8080
paths:
  /api/auth/register:
    post:
      summary: Registrar una nueva cuenta (FR-001, FR-002, FR-003)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Cuenta creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Email o contraseña inválidos
        "409":
          description: El email ya está en uso

  /api/auth/login:
    post:
      summary: Iniciar sesión (FR-004, FR-005, FR-010)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Credenciales válidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciales inválidas (mensaje genérico, no revela si el email existe)
        "429":
          description: Cuenta temporalmente bloqueada por demasiados intentos fallidos

  /api/auth/logout:
    post:
      summary: Cerrar sesión e invalidar el token actual (FR-007)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Token invalidado
        "401":
          description: Token ausente, expirado o ya invalidado

  /api/auth/me:
    get:
      summary: Obtener el usuario autenticado actual (FR-006)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Token ausente, expirado o invalidado (FR-008)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresAt:
          type: string
          format: date-time
