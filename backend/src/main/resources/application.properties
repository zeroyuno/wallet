spring.application.name=backend

# Datos de conexión: valores por defecto solo para desarrollo local (misma base que
# docker-compose.yml). En cualquier otro entorno se sobreescriben con las variables de entorno
# DB_URL/DB_USER/DB_PASSWORD (mismo patrón ya usado para JWT_SECRET más abajo).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wallet}
spring.datasource.username=${DB_USER:wallet}
spring.datasource.password=${DB_PASSWORD:wallet}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Clave de firma JWT: SOLO para desarrollo local. En cualquier otro entorno se debe sobreescribir
# con la variable de entorno JWT_SECRET (>= 32 caracteres, ver research.md de specs/001-user-auth).
app.security.jwt.secret=${JWT_SECRET:dev-only-change-me-please-this-secret-is-not-for-production-0123456789}
app.security.jwt.expiration=7d

# Estados de cuenta en PDF: sin valor por defecto — sin esta key, StatementImportService rechaza el
# request con un error claro en vez de fallar en silencio dentro del @Async (research.md #2 de la
# feature 006).
app.anthropic.api-key=${ANTHROPIC_API_KEY:}

# Default de Spring Boot es 1MB, insuficiente para un PDF de varias páginas (research.md #6).
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

